

services:
  gateway:
    image: nginx:alpine
    container_name: api-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - auth-api
      - todos-api
    networks:
      - microservices-net

  redis-queue:
    image: redis:7.0-alpine
    container_name: redis-queue
    command: redis-server --requirepass PRFT_REDIS_2026
    networks:
      - microservices-net

  users-api:
    build: ./users-api
    container_name: users-api
    environment:
      - JWT_SECRET=PRFT
      - SERVER_PORT=8083
    networks:
      - microservices-net
  

  auth-api:
    build: ./auth-api
    container_name: auth-api
    environment:
      - AUTH_API_PORT=8000
      - USERS_API_ADDRESS=http://users-api:8083
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - JWT_SECRET=PRFT
    depends_on:
      - users-api
    networks:
      - microservices-net

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-net

  todos-api:
    build: ./todos-api
    container_name: todos-api
    environment:
      - TODO_API_PORT=8082
      - JWT_SECRET=PRFT
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - REDIS_HOST=redis-queue
      - REDIS_PASSWORD=PRFT_REDIS_2026
      - REDIS_PORT=6379
      - REDIS_CHANNEL=log_channel
    depends_on:
      - redis-queue
    networks:
      - microservices-net

  log-processor:
    build: ./log-message-processor
    container_name: log-processor
    environment:
      - REDIS_HOST=redis-queue
      - REDIS_PORT=6379
      - REDIS_CHANNEL=log_channel
      - REDIS_PASSWORD=PRFT_REDIS_2026
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis-queue
    networks:
      - microservices-net

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      - PORT=8080
      - AUTH_API_ADDRESS=http://auth-api:8000  
      - TODOS_API_ADDRESS=http://todos-api:8082
    depends_on:
      - auth-api
      - todos-api
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge